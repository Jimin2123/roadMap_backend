version: '3.8'
services:
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - '6379:6379' # Redis 기본 포트
    volumes:
      - ./docker/redis/config:/usr/local/etc/redis
      - ./docker/redis/data:/data
      - ./docker/redis/log:/var/log/redis
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
