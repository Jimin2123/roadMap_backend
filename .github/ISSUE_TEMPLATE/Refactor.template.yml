name: '♻️ Refactor'
description: '코드 리팩토링, 성능 개선, 구조 변경을 제안합니다.'
title: '[Refactor] '
labels: ['refactor']
body:
  - type: textarea
    id: description
    attributes:
      label: '리팩토링 대상'
      description: '어떤 코드 또는 영역을 리팩토링하려고 하시나요?'
      placeholder: '예: `UserService`의 `getUserProfile` 메소드'
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: '리팩토링 이유'
      description: '왜 리팩토링이 필요한가요? (예: 코드 가독성, 성능 문제, 유지보수성 등)'
      placeholder: '예: 현재 코드가 너무 복잡하고 중복이 많아 유지보수가 어렵습니다.'
    validations:
      required: true
  - type: textarea
    id: plan
    attributes:
      label: '개선 방안'
      description: '코드를 어떻게 개선할 것인지 구체적인 방안을 제시해주세요.'
      placeholder: '예: OOO 디자인 패턴을 적용하여 코드 구조를 개선하겠습니다.'
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: '추가 정보'
      description: '참고 자료나 관련된 이슈가 있다면 링크를 첨부해주세요.'
