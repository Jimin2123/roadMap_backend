name: '✨ Feature Request'
description: '새로운 기능을 제안합니다.'
title: '[Feature] '
labels: ['feature']
body:
  - type: markdown
    attributes:
      value: |
        **좋은 아이디어를 제안해주셔서 감사합니다!** 아래 양식에 맞춰 작성해주시면 더 빠르게 검토할 수 있습니다.
  - type: textarea
    id: motivation
    attributes:
      label: '🤔 제안 배경'
      description: '이 기능이 왜 필요한가요? 어떤 문제를 해결할 수 있나요?'
      placeholder: '예: 현재 시스템에서는 OOO 기능이 없어 사용자들이 불편을 겪고 있습니다.'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: '💡 제안 내용'
      description: '제안하는 기능에 대해 구체적으로 설명해주세요.'
      placeholder: '사용자 입장에서 어떻게 동작하면 좋을지, 어떤 기능들이 포함되면 좋을지 상세하게 작성해주세요.'
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: '대안'
      description: '혹시 고려해본 다른 대안이 있나요?'
      placeholder: '예: OOO 라이브러리를 사용하는 방법도 고려해보았으나...'
  - type: checkboxes
    id: tasks
    attributes:
      label: '✅ 예상 작업 목록'
      description: '이 기능을 구현하기 위해 어떤 작업들이 필요할까요?'
      options:
        - label: API 설계
        - label: DB 스키마 변경
        - label: 백엔드 로직 구현
        - label: 프론트엔드 UI 개발
        - label: 테스트 코드 작성
        - label: 문서 업데이트