name: '🐞 Bug Report'
description: '발생한 버그를 리포트합니다.'
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        **버그 리포트를 작성해주셔서 감사합니다!** 아래 양식에 맞춰 최대한 상세하게 작성해주세요.
  - type: textarea
    id: description
    attributes:
      label: '🐛 버그 설명'
      description: '버그에 대해 명확하고 간결하게 설명해주세요.'
      placeholder: '예: 사용자가 로그인을 시도할 때 500 에러가 발생합니다.'
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: '🔍 재현 방법'
      description: '다른 사람이 버그를 재현할 수 있도록 단계별로 설명해주세요.'
      placeholder: |
        1. `/login` 페이지로 이동합니다.
        2. 아이디와 비밀번호를 입력합니다.
        3. "로그인" 버튼을 클릭합니다.
        4. 에러가 발생합니다.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: '✅ 기대했던 동작'
      description: '원래 기대했던 동작은 무엇이었나요?'
      placeholder: '예: 성공적으로 로그인되어 메인 페이지로 이동해야 합니다.'
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: '📸 스크린샷 또는 로그'
      description: '문제를 이해하는 데 도움이 되는 스크린샷, 동영상, 로그 등을 첨부해주세요.'
  - type: dropdown
    id: severity
    attributes:
      label: '🔥 심각도'
      description: '이 버그의 심각도를 선택해주세요.'
      options:
        - 'Critical: 주요 기능 마비, 데이터 손실'
        - 'Major: 주요 기능 장애'
        - 'Minor: 사소한 기능 문제 또는 UI 깨짐'
        - 'Trivial: 오타 등'
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: '추가 정보'
      description: '문제 해결에 도움이 될 만한 추가적인 정보가 있다면 작성해주세요.'